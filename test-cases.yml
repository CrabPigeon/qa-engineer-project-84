   - summary: Успешное добавление товаров в корзину
  requirement: "Пользователь должен иметь возможность добавлять товары в корзину и просматривать содержимое корзины"
  prerequisites: На сайте присутствуют товары
  test-data: Товар 1 = "Essence Mascara Lash Princess", Товар 2 = "Eyeshadow Palette with Mirror"
  steps:
  - Найти Товар 1 на странице каталога или через строку поиска
  - Нажать кнопку 'Add to cart'
  - Повторить для Товар 2
  - Перейти в корзину по кнопке "Cart" 
  - Проверить содержимое корзины
  expected-result: |
    Оба товара успешно добавлены в корзину.
    В корзине отображаются выбранные товары с количеством, ценой за единицу и общей суммой.
    Иконка корзины показывает количество добавленных позиций.

  - summary: Успешное переключение языка интерфейса
  requirement: Сайт должен иметь локализацию (перевод) на русский и английский языки
  prerequisites: Локализация на русский и английский языки
  steps:
  - Найти переключатель языка в шапке сайта
  - Переключить на русский язык
  - Проверить перевод интерфейса, кнопок, названия и описание товаров
  - Переключить на английский и повторить проверку
  expected-result: |
    При переключении на русский интерфейс и описание товаров отображаются на русском языке
    При переключении на английский интерфейс и описание товаров отображаются на английском языке
    Функциональность сохраняется после переключения языка
  
- summary: Проверка работы мобильной версия
  requirement: "Сайт должен иметь мобильную версию. Сайт должен быть доступен на различных устройствах. Корректное отображение верстки на всех устройствах (адаптивность)"
  test-data: "Разрешения экрана: iPhone 16 (393 × 852), iPad (768x1024), Galaxy S25(360 x 780), Desktop (1920x1080)"
  steps:
  - Открыть сайт в браузере и переключить DevTools в режим мобильного устройства 
  - Проверить отображение главной страницы, поиска, фильтров, карточек товаров."
  - Повторить для планшетного и desktop разрешений
  expected-result: |
    Сайт корректно адаптируется под все выбранные разрешения и устройства.
    Все функциональные элементы доступны и удобны для использования.
    Верстка не ломается

 - summary: Совместимость с последними версиями браузеров
  requirement: "Сайт нужно протестировать на совместимость с последними версиями браузеров"
  prerequisites: "Доступ к последним версиям браузеров: Google Chrome, Mozilla Firefox, Microsoft Edge, Safari."
  test-data: "Latest stable версии браузеров на момент тестирования"
  steps:
  - Открыть сайт в Google Chrome
  - Выполнить основные сценарии: поиск, фильтрация, просмотр товара, добавление в корзину, смена языка.
  - "Повторить те же сценарии в Mozilla Firefox , Microsoft Edge и Safari ."
  - "Проверить консоль на ошибки JavaScript и визуальные отличия."
  expected-result: |
    Сайт работает корректно во всех проверенных браузерах.
    Отсутствуют критические различия в верстке или функциональности.
    Нет ошибок JavaScript в консоли.
    
