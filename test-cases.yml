  - summary: Сохранение корзины в сессии браузера
  requirement: Сайт должен сохранять корзину с выбранными товарами в сессии браузера
  prerequisites: Корзина на сайте использует sessionStorage
  test-data: Товар 1 = "Essence Mascara Lash Princess"
  steps:
  -  Добавить Товар 1 в корзину
  - Обновить текущую страницу
  - Проверить содержимое корзины
  expected-result: |
    После обновления страницы содержимое корзины сохраняется
